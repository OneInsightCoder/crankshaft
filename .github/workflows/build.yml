name: Build Crankshaft Fork

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Which platform to build"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - windows
          - mac
          - linux

  push:
    branches:
      - main
      - master
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build-windows:
    name: Build Windows
    if: github.event_name == 'push' || github.event.inputs.target == 'all' || github.event.inputs.target == 'windows'
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Install dependencies
        shell: pwsh
        run: |
          pnpm config set registry https://registry.npmjs.org/
          pnpm install --frozen-lockfile

      - name: Build Windows
        shell: pwsh
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: |
          pnpm run build
          pnpm exec electron-builder --win nsis portable zip --x64 --publish never

      - name: Show dist files
        shell: pwsh
        run: |
          Get-ChildItem -Recurse dist | Select-Object FullName, Length

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Crankshaft-Windows
          if-no-files-found: error
          path: |
            dist/**/*.exe
            dist/**/*.zip

  build-mac:
    name: Build macOS
    if: github.event_name == 'push' || github.event.inputs.target == 'all' || github.event.inputs.target == 'mac'
    runs-on: macos-14

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Install dependencies
        run: |
          pnpm config set registry https://registry.npmjs.org/
          pnpm install --frozen-lockfile

      - name: Build macOS
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: |
          pnpm run build
          pnpm exec electron-builder --mac dmg --arm64 --publish never

      - name: Show dist files
        run: |
          find dist -maxdepth 5 -print

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Crankshaft-macOS-arm64
          if-no-files-found: error
          path: |
            dist/**/*.dmg

  build-linux:
    name: Build Linux
    if: github.event_name == 'push' || github.event.inputs.target == 'all' || github.event.inputs.target == 'linux'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools rpm

      - name: Install dependencies
        run: |
          pnpm config set registry https://registry.npmjs.org/
          pnpm install --frozen-lockfile

      - name: Build Linux
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: |
          pnpm run build
          pnpm exec electron-builder --linux AppImage --x64 --publish never

      - name: Show dist files
        run: |
          find dist -maxdepth 5 -print

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Crankshaft-Linux
          if-no-files-found: error
          path: |
            dist/**/*.AppImage
